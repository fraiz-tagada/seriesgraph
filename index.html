<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Grid notes (fidèle + export + fond + logo + mode seasonal/film) — iOS friendly</title>

  <style>
    :root{
      --bg:#070a12;
      --panel: rgba(255,255,255,.06);
      --border: rgba(255,255,255,.10);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.62);

      --tap: 44px;
      --sheetPad: 12px;
      --sheetRadius: 18px;
    }

    html,body{
      height:100%;
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
    }

    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:16px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
    }

    .ui{
      border:1px solid var(--border);
      background: var(--panel);
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 12px;
      backdrop-filter: blur(10px);
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between
    }
    .left,.right{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center
    }

    button{
      min-height: var(--tap);
      border:1px solid var(--border);
      background: rgba(0,0,0,.18);
      color: var(--text);
      border-radius: 12px;
      padding: 8px 10px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }
    button:active{transform: translateY(1px);}
    .ghost{background: transparent;}

    .switch{display:flex;align-items:center;gap:10px}
    .switch span{color:var(--muted);font-weight:700;font-size:13px}

    .toggle{
      width:69px;
      height:20px;
      border-radius:999px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.14);
      position:relative;
      padding:0;
      cursor:pointer;
      transition: background-color 180ms ease, border-color 180ms ease;
    }

    .toggle[aria-checked="true"]{
      background: #0A84FF;
      border-color: #0A84FF;
    }

    .thumb{
      width:22px;
      height:22px;
      border-radius:999px;
      background:#ffffff;
      position:absolute;
      top:50%;
      left:3px;
      transform:translateY(-50%);
      transition:left 180ms cubic-bezier(.4,0,.2,1);
    }
    .toggle[aria-checked="true"] .thumb{left:42px;}

    .legend{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:10px
    }
    .leg-item{
      display:flex;
      align-items:center;
      gap:7px;
      font-size:13px;
      color:var(--muted);
      font-weight:700
    }
    .swatch{
      width:14px;height:14px;border-radius:4px;
      border:1px solid rgba(255,255,255,.18)
    }

    textarea{
      width:100%;
      min-height:140px;
      border-radius:14px;
      border:1px solid var(--border);
      background: rgba(0,0,0,.14);
      color: var(--text);
      padding:12px;
      outline:none;
      font: 575 15px system-ui, -apple-system, Segoe UI, Roboto, Arial;
      margin-top:10px;
    }

    .hint{color:var(--muted);font-size:13px;line-height:1.35;margin:8px 0 0}

    label{
      color:var(--muted);
      font-size:13px;
      font-weight:700;
      display:flex;
      align-items:center;
      gap:8px
    }

    input[type="file"]{color:var(--muted);font-size:13px}

    select{
      min-height: var(--tap);
      border-radius:10px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: var(--text);
      padding:7px 10px;
      outline:none;
      font-weight:750;
      font-size:16px;
    }

    .smallInput{
      min-height: var(--tap);
      width: 130px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: var(--text);
      padding:7px 10px;
      outline:none;
      font-weight:750;
      font-size:16px;
    }

    canvas{
      width:100%;
      height:auto;
      border-radius:18px;
      display:block;
      background:#000;
      touch-action: manipulation;
    }

    .hidden{display:none !important;}

    @media (max-width: 760px){
      .ui{
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        margin: 0;
        border-radius: var(--sheetRadius) var(--sheetRadius) 0 0;
        padding: var(--sheetPad);
        padding-bottom: calc(var(--sheetPad) + env(safe-area-inset-bottom));
        z-index: 9999;
        max-width: none;
        border-left: none;
        border-right: none;
        max-height: 55vh;
        overflow: auto;
        -webkit-overflow-scrolling: touch;
      }

      .wrap{
        padding: 12px;
        padding-bottom: calc(55vh + env(safe-area-inset-bottom) + 12px);
      }

      :root{
        --safe-top: env(safe-area-inset-top);
        --safe-bottom: env(safe-area-inset-bottom);
        --safe-left: env(safe-area-inset-left);
        --safe-right: env(safe-area-inset-right);
      }

      html, body{ height: 100%; }

      .wrap{
        max-width:980px;
        margin:0 auto;
        padding:
          calc(16px + var(--safe-top))
          calc(16px + var(--safe-right))
          calc(16px + var(--safe-bottom))
          calc(16px + var(--safe-left));
      }

      .ui{
        position: sticky;
        top: calc(0px + var(--safe-top));
        z-index: 10;

        border:1px solid var(--border);
        background: var(--panel);
        border-radius: 16px;
        padding: 12px;
        margin-bottom: 12px;
        backdrop-filter: blur(10px);
      }

      canvas{
        display:block;
        width:100%;
        height:auto;
        border-radius:18px;
        background:#000;
        margin-bottom: calc(16px + var(--safe-bottom));
      }

      .row{flex-direction: column; align-items: stretch; justify-content:flex-start;}
      .left,.right{width:100%; justify-content:flex-start;}
      .hint{display:none;}
    }
  </style>
</head>

<body>
<div class="wrap">
  <div class="ui" id="ui">
    <div class="row">
      <div class="left">
        <div class="switch">
          <span>Card mode</span>
          <button id="modeBtn" class="toggle" type="button" role="switch" aria-checked="false" title="Toggle seasonal/film cards view">
            <span class="thumb"></span>
          </button>
        </div>

        <label id="cardBgLabel" class="hidden">Card
          <select id="cardBgSeason"></select>
        </label>
        <button id="cardBgPickBtn" type="button" class="hidden">Card BG</button>
        <button id="cardBgClearOneBtn" type="button" class="ghost hidden">Clear</button>
        <button id="cardBgClearAllBtn" type="button" class="ghost hidden">Clear all</button>
        <input id="cardBgFile" type="file" accept="image/*" class="hidden" />

        <button id="exportBtn" type="button">Export PNG</button>
      </div>

      <div class="right">
        <label>Background
          <input id="bgFile" type="file" accept="image/*" />
        </label>
        <button id="clearBgBtn" class="ghost" type="button">Clear BG</button>

        <label>Logo
          <input id="logoFile" type="file" accept="image/*" />
        </label>
        <button id="clearLogoBtn" class="ghost" type="button">Clear logo</button>

        <label>Note globale
          <input id="seriesScore" class="smallInput" type="text" inputmode="decimal" placeholder="ex: 9.5" />
        </label>

        <label>Episodes
          <input id="seriesEpisodesOverride" class="smallInput" type="text" inputmode="numeric" placeholder="auto" />
        </label>
      </div>
    </div>

    <div class="legend" id="legend"></div>

    <p class="hint">
      1ère ligne = saisons ; lignes suivantes = notes des épisodes ; vide/NA = case vide ; X = "?".
      En mode cartes, tu choisis la saison dans le menu puis tu uploades 1 image pour CE bloc.
    </p>

    <textarea id="csv">S1,S2,S3,S4,S5
9.3,8.7,8.4,7.1,8.6
8.3,8.4,8.0,7.1,8.3
8.5,8.5,7.9,7.3,8.0
8.9,8.7,8.1,7.3,8.0
8.4,9.1,8.2,7.3,8.1
9.2,9.2,8.6,7.4,8.1
8.9,8.8,8.3,7.2,7.6
8.5,9.4,8.9,7.8,8.5
9.3,9.4,8.7,7.7,8.6
9.3,8.4,8.5,7.7,8.3
NA,NA,NA,7.2,NA</textarea>
  </div>

  <canvas id="c" width="900" height="1200"></canvas>
</div>

<script>
const MIN_SCORE = 1.0;
const MAX_SCORE = 10.0;

const ranges = [
  { label: "Cinema",  min: 9.6, max: 10.0, color: "#1DA1F2", text: "rgba(255,255,255,.95)" },
  { label: "Amazing", min: 9.0, max: 9.5,  color: "#186A3B", text: "rgba(255,255,255,.95)" },
  { label: "Great",   min: 8.0, max: 8.9,  color: "#28B463", text: "rgba(20,20,20,.92)" },
  { label: "Average", min: 7.0, max: 7.9,  color: "#F4D03F", text: "rgba(25,25,25,.92)" },
  { label: "Weak",    min: 6.0, max: 6.9,  color: "#F39C12", text: "rgba(25,25,25,.92)" },
  { label: "Bad",     min: 3.0, max: 5.9,  color: "#E74C3C", text: "rgba(255,255,255,.95)" },
  { label: "Trash",   min: 1.0, max: 2.9,  color: "#633974", text: "rgba(255,255,255,.95)" },
];
const missing = { label: "Missing", color: "rgba(255,255,255,.10)", text: "rgba(255,255,255,0)" };
const unknown = { label: "Unknown", color: "rgba(255,255,255,.18)", text: "rgba(255,255,255,.65)" };

const L = {
  pad: 38,
  leftLabelW: 64,
  topLabelH: 46,

  cellW: 78,
  cellH: 46,
  gapX: 10,
  gapY: 10,

  r: 5,

  fontAxis: "700 17px -apple-system, system-ui, Segoe UI, Roboto, Arial",
  fontCell: "700 30px -apple-system, system-ui, Segoe UI, Roboto, Arial",
  fontAvg: "650 29px -apple-system, system-ui, Segoe UI, Roboto, Arial",
  fontAvgLabel: "600 18px -apple-system, system-ui, Segoe UI, Roboto, Arial",

  fontSeriesScore: "800 22px -apple-system, system-ui, Segoe UI, Roboto, Arial",
  fontSeriesScoreSuffix: "700 14px -apple-system, system-ui, Segoe UI, Roboto, Arial",
  fontSeriesMeta:  "650 22px -apple-system, system-ui, Segoe UI, Roboto, Arial",
};

const FLEX = { fewEp: 7, topMin: 34, topMax: 70 };

const AVG = { gapFromGrid: 56, blockH: 44, barOffset: 18, barH: 7 };

// ✅ gaps réduits
const FOOTER = { gapFromAvg: 6, minH: 88 };

const LOGO = {
  padX: 56,
  maxW: 260,
  maxH: 96,
  opacity: 0.95,
  yBias: 0,
  targetArea: 16000,
  maxUpscale: 1.6
};

const CARD = {
  pad: 28,
  colsMinW: 900,
  cardH: 140,
  gap: 18,
  radius: 16,
  innerPadX: 28,
  badgeSize: 56,
  badgeRadius: 12,
  titleFont: "800 30px -apple-system, system-ui, Segoe UI, Roboto, Arial",
  badgeFont: "800 24px -apple-system, system-ui, Segoe UI, Roboto, Arial",
  bgOpacity: 0.90,
};

const SERIES_FOOT = {
  starSize: 22,
  gap: 4,
  gapUnderLogo: 19,
  padY: 10,
  stackTopPad: 10,
};

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d", { alpha: true });

let activeCanvas = canvas;
let activeCtx = ctx;

const EXPORT_SCALE = 3;

const csvEl = document.getElementById("csv");
const legendEl = document.getElementById("legend");

const modeBtn = document.getElementById("modeBtn");
let seasonalMode = false;

const exportBtn = document.getElementById("exportBtn");

const bgFile = document.getElementById("bgFile");
const clearBgBtn = document.getElementById("clearBgBtn");

const logoFile = document.getElementById("logoFile");
const clearLogoBtn = document.getElementById("clearLogoBtn");

const seriesScoreEl = document.getElementById("seriesScore");
const seriesEpisodesOverrideEl = document.getElementById("seriesEpisodesOverride");

const cardBgLabel = document.getElementById("cardBgLabel");
const cardBgSeason = document.getElementById("cardBgSeason");
const cardBgPickBtn = document.getElementById("cardBgPickBtn");
const cardBgClearOneBtn = document.getElementById("cardBgClearOneBtn");
const cardBgClearAllBtn = document.getElementById("cardBgClearAllBtn");
const cardBgFile = document.getElementById("cardBgFile");

let bgImage = null;
let logoImage = null;
let cardBgImages = [];

function clamp(x,a,b){ return Math.max(a, Math.min(b, x)); }
const px = (n) => Math.round(n);

function mulberry32(a){
  return function(){
    let t = a += 0x6D2B79F5;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function drawTextCentered(text, cx, cy){
  const m = activeCtx.measureText(text);
  const y = cy + (m.actualBoundingBoxAscent - m.actualBoundingBoxDescent) / 2;
  activeCtx.textBaseline = "alphabetic";
  activeCtx.fillText(text, px(cx), px(y));
}

function parseCSV(text){
  const lines = text.trim().split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  if (!lines.length) return { seasons:[], rows:[] };

  const seasons = lines[0].split(",").map((s,i)=> (s.trim() || `S${i+1}`));
  const rows = [];

  for (let i=1;i<lines.length;i++){
    const parts = lines[i].split(",").map(s=>s.trim());
    rows.push(parts.map(p=>{
      if (!p || p.toUpperCase() === "NA") return null;
      if (p.toUpperCase() === "X") return "X";
      const v = Number(p.replace(",", "."));
      return Number.isFinite(v) ? v : null;
    }));
  }
  return { seasons, rows };
}

function avg(arr){
  const vals = arr.filter(v => typeof v === "number" && !Number.isNaN(v));
  if (!vals.length) return null;
  return vals.reduce((a,b)=>a+b,0)/vals.length;
}

function pickBucket(score, minScore, maxScore){
  if (typeof score !== "number" || Number.isNaN(score)) return missing;
  const s = clamp(score, minScore, maxScore);
  for (const r of ranges){
    if (s >= r.min && s <= r.max) return r;
  }
  return missing;
}

function roundRectPath(x,y,w,h,r){
  const rr = Math.min(r, w/2, h/2);
  activeCtx.beginPath();
  activeCtx.moveTo(x+rr, y);
  activeCtx.arcTo(x+w, y, x+w, y+h, rr);
  activeCtx.arcTo(x+w, y+h, x, y+h, rr);
  activeCtx.arcTo(x, y+h, x, y, rr);
  activeCtx.arcTo(x, y, x+w, y, rr);
  activeCtx.closePath();
}

function drawBackground(W,H){
  activeCtx.save();
  activeCtx.shadowColor = "rgba(0,0,0,0)";
  activeCtx.shadowBlur = 0;
  activeCtx.shadowOffsetX = 0;
  activeCtx.shadowOffsetY = 0;

  activeCtx.fillStyle = "#04060c";
  activeCtx.fillRect(0,0,W,H);

  if (bgImage){
    const s = Math.max(W/bgImage.width, H/bgImage.height);
    const iw = bgImage.width*s, ih = bgImage.height*s;
    const ix = (W-iw)/2, iy = (H-ih)/2;
    activeCtx.globalAlpha = 0.92;
    activeCtx.drawImage(bgImage, ix, iy, iw, ih);
    activeCtx.globalAlpha = 1;
    activeCtx.fillStyle = "rgba(0,0,0,.55)";
    activeCtx.fillRect(0,0,W,H);
  } else {
    const rand = mulberry32(123456 ^ (W*73856093) ^ (H*19349663));
    activeCtx.fillStyle = "rgba(255,255,255,.03)";
    for (let i=0;i<60;i++){
      const x=rand()*W, y=rand()*H, r=2+rand()*8;
      activeCtx.beginPath(); activeCtx.arc(x,y,r,0,Math.PI*2); activeCtx.fill();
    }
    activeCtx.fillStyle = "rgba(0,0,0,.35)";
    activeCtx.fillRect(0,0,W,H);
  }

  activeCtx.restore();
}

/* =========================
   LOGO
========================= */
function getLogoScaledSize(){
  if (!logoImage) return { w: 0, h: 0, s: 1 };
  const iw = logoImage.width;
  const ih = logoImage.height;

  let s = Math.sqrt(LOGO.targetArea / (iw * ih));
  s = Math.min(s, LOGO.maxW / iw, LOGO.maxH / ih);
  s = Math.min(s, LOGO.maxUpscale);

  const w = Math.round(iw * s);
  const h = Math.round(ih * s);
  return { w, h, s };
}

/* mode "stack": logo en haut à droite (pas centré) */
function drawLogoInFooterStacked(W, footerTop){
  if (!logoImage) return null;
  const { w, h } = getLogoScaledSize();
  const x = W - LOGO.padX - w;
  const y = Math.round(footerTop + SERIES_FOOT.stackTopPad + LOGO.yBias);

  activeCtx.save();
  activeCtx.shadowColor = "rgba(0,0,0,0)";
  activeCtx.shadowBlur = 0;
  activeCtx.shadowOffsetX = 0;
  activeCtx.shadowOffsetY = 0;
  activeCtx.globalAlpha = LOGO.opacity;
  activeCtx.drawImage(logoImage, x, y, w, h);
  activeCtx.restore();

  return { x, y, w, h };
}

/* mode normal: logo centré */
function drawLogoInFooterCentered(W, footerTop, footerH){
  if (!logoImage) return null;
  const { w, h } = getLogoScaledSize();

  const x = W - LOGO.padX - w;
  let y = Math.round(footerTop + (footerH - h) / 2 + LOGO.yBias);

  const padY = 8;
  const yMin = footerTop + padY;
  const yMax = footerTop + footerH - h - padY;
  y = clamp(y, yMin, yMax);

  activeCtx.save();
  activeCtx.shadowColor = "rgba(0,0,0,0)";
  activeCtx.shadowBlur = 0;
  activeCtx.shadowOffsetX = 0;
  activeCtx.shadowOffsetY = 0;
  activeCtx.globalAlpha = LOGO.opacity;
  activeCtx.drawImage(logoImage, x, y, w, h);
  activeCtx.restore();

  return { x, y, w, h };
}

/* =========================
   NOTE GLOBALE
========================= */
function parseSeriesScoreInput(){
  const raw = (seriesScoreEl?.value || "").trim();
  if (!raw) return null;
  const v = Number(raw.replace(",", "."));
  if (!Number.isFinite(v)) return null;
  return clamp(v, MIN_SCORE, MAX_SCORE);
}

function parseEpisodesOverride(){
  const raw = (seriesEpisodesOverrideEl?.value || "").trim();
  if (!raw) return null;
  if (raw.toUpperCase() === "X") return "X";
  const n = Number(raw);
  if (!Number.isFinite(n) || n <= 0) return null;
  return Math.floor(n);
}

function computeEpisodesAuto(rows){
  let c = 0;
  for (const r of rows){
    if (!r) continue;
    for (const v of r){
      if (v == null) continue;
      c++;
    }
  }
  return c || null;
}

function formatScore(value){
  if (value === 10) return "10";
  return value.toFixed(1);
}

function drawStarIcon(x, y, size, color){
  const cx = x + size/2;
  const cy = y + size/2;
  const spikes = 5;
  const outer = size * 0.50;
  const inner = size * 0.22;

  let rot = -Math.PI / 2;
  const step = Math.PI / spikes;

  activeCtx.save();
  activeCtx.beginPath();
  activeCtx.moveTo(cx, cy - outer);
  for (let i = 0; i < spikes; i++){
    activeCtx.lineTo(cx + Math.cos(rot) * outer, cy + Math.sin(rot) * outer);
    rot += step;
    activeCtx.lineTo(cx + Math.cos(rot) * inner, cy + Math.sin(rot) * inner);
    rot += step;
  }
  activeCtx.closePath();
  activeCtx.fillStyle = color;
  activeCtx.fill();
  activeCtx.restore();
}

/* mesure pour dimensionner footer correctement */
function measureSeriesScoreBlock(rows){
  const score = parseSeriesScoreInput();
  if (score == null) return null;

  const override = parseEpisodesOverride();
  const autoEp = computeEpisodesAuto(rows);
  const ep = (override != null) ? override : (autoEp != null ? autoEp : "X");

  const mainText = formatScore(Math.round(score * 10) / 10);
  const suffixText = "/10";
  const metaText = ` \u200A(${ep} episodes)`;

  activeCtx.save();

  activeCtx.font = L.fontSeriesScore;
  const mMain = activeCtx.measureText(mainText);
  const mainAscent = mMain.actualBoundingBoxAscent || 18;
  const mainDescent = mMain.actualBoundingBoxDescent || 6;

  activeCtx.font = L.fontSeriesScoreSuffix;
  const mSuffix = activeCtx.measureText(suffixText);
  const suffixAscent = mSuffix.actualBoundingBoxAscent || 11;
  const suffixDescent = mSuffix.actualBoundingBoxDescent || 4;

  activeCtx.font = L.fontSeriesMeta;
  const mMeta = activeCtx.measureText(metaText);
  const metaAscent = mMeta.actualBoundingBoxAscent || 18;
  const metaDescent = mMeta.actualBoundingBoxDescent || 6;

  const ascent = Math.max(mainAscent, suffixAscent, metaAscent);
  const descent = Math.max(mainDescent, suffixDescent, metaDescent);
  const lineH = ascent + descent;

  const starSize = SERIES_FOOT.starSize;
  const gap = SERIES_FOOT.gap;

  const totalW = starSize + gap + mMain.width + mSuffix.width + mMeta.width;
  const totalH = Math.max(starSize, lineH);

  activeCtx.restore();

  return {
    mainText,
    suffixText,
    metaText,
    totalW,
    totalH,
    ascent,
    mMainW: mMain.width,
    mSuffixW: mSuffix.width
  };
}

/* dessine note en footer (X jamais lié au logo) */
function drawSeriesScoreFooter(W, footerTop, footerH, logoRectOrNull, rows){
  const m = measureSeriesScoreBlock(rows);
  if (!m) return;

  const anchorRight = (W - LOGO.padX);

  let topY;
  if (logoRectOrNull){
    topY = logoRectOrNull.y + logoRectOrNull.h + SERIES_FOOT.gapUnderLogo;
  } else {
    topY = footerTop + Math.round((footerH - m.totalH) / 2);
  }

  topY = clamp(topY, footerTop + SERIES_FOOT.padY, footerTop + footerH - m.totalH - SERIES_FOOT.padY);
  const xLeft = clamp(anchorRight - m.totalW, 12, W - 12 - m.totalW);

  const starY = topY + Math.round((m.totalH - SERIES_FOOT.starSize) / 2) - 3;
  const baselineY = topY + m.ascent;

  drawStarIcon(px(xLeft), px(starY), SERIES_FOOT.starSize, "orange");

  activeCtx.save();
  activeCtx.shadowColor = "rgba(0,0,0,0)";
  activeCtx.shadowBlur = 0;
  activeCtx.shadowOffsetX = 0;
  activeCtx.shadowOffsetY = 0;

  const textX = xLeft + SERIES_FOOT.starSize + SERIES_FOOT.gap;

  activeCtx.font = L.fontSeriesScore;
  activeCtx.fillStyle = "rgba(255,255,255,.95)";
  activeCtx.textAlign = "left";
  activeCtx.textBaseline = "alphabetic";
  activeCtx.fillText(m.mainText, px(textX), px(baselineY));

  activeCtx.font = L.fontSeriesScoreSuffix;
  activeCtx.fillStyle = "rgba(255,255,255,.85)";
  activeCtx.fillText(m.suffixText, px(textX + m.mMainW), px(baselineY));

  activeCtx.font = L.fontSeriesMeta;
  activeCtx.fillStyle = "rgba(255,255,255,.55)";
  activeCtx.fillText(m.metaText, px(textX + m.mMainW + m.mSuffixW), px(baselineY));

  activeCtx.restore();
}

/* =========================
   LÉGENDE
========================= */
function buildLegend(){
  legendEl.innerHTML = "";
  for (const r of ranges){
    const item = document.createElement("div");
    item.className = "leg-item";
    item.innerHTML = `<span class="swatch" style="background:${r.color}"></span><span>${r.label}</span>`;
    legendEl.appendChild(item);
  }
}

/* =========================
   MODE CARTES
========================= */
function computeSeasonAverages(seasons, rows){
  const S = seasons.length;
  const out = [];

  for (let s=0; s<S; s++){
    const colRaw = rows.map(r => (r && s < r.length) ? r[s] : null);
    const nums = colRaw.filter(v => typeof v === "number" && !Number.isNaN(v));
    const hasUnknown = colRaw.some(v => v === "X");
    const a = nums.length ? (nums.reduce((p,c)=>p+c,0) / nums.length) : null;

    out.push({ title: seasons[s] || `S${s+1}`, avg: a, idx: s, hasUnknown });
  }
  return out;
}

function drawCoverImage(img, x, y, w, h, opacity){
  if (!img) return;
  const s = Math.max(w / img.width, h / img.height);
  const iw = img.width * s;
  const ih = img.height * s;
  const ix = x + (w - iw) / 2;
  const iy = y + (h - ih) / 2;

  activeCtx.save();
  activeCtx.globalAlpha = opacity;
  activeCtx.drawImage(img, ix, iy, iw, ih);
  activeCtx.restore();
}

function drawSeasonCard(x, y, w, h, item, minScore, maxScore){
  activeCtx.save();
  activeCtx.shadowColor = "rgba(0,0,0,.55)";
  activeCtx.shadowBlur = 18;
  activeCtx.shadowOffsetY = 10;

  roundRectPath(x, y, w, h, CARD.radius);
  activeCtx.fillStyle = "rgba(255,255,255,.06)";
  activeCtx.fill();
  activeCtx.restore();

  activeCtx.save();
  roundRectPath(x, y, w, h, CARD.radius);
  activeCtx.clip();

  const bg = cardBgImages[item.idx] || null;
  if (bg) drawCoverImage(bg, x, y, w, h, CARD.bgOpacity);

  activeCtx.fillStyle = "rgba(0,0,0,.25)";
  activeCtx.fillRect(x, y, w, h);

  const g = activeCtx.createLinearGradient(x, y, x+w, y);
  g.addColorStop(0, "rgba(0,0,0,.70)");
  g.addColorStop(0.55, "rgba(0,0,0,.35)");
  g.addColorStop(1, "rgba(0,0,0,.55)");
  activeCtx.fillStyle = g;
  activeCtx.fillRect(x, y, w, h);

  activeCtx.restore();

  const tx = x + CARD.innerPadX;
  const ty = y + h/2;

  activeCtx.save();
  activeCtx.shadowColor = "rgba(0,0,0,0)";
  activeCtx.shadowBlur = 0;
  activeCtx.shadowOffsetX = 0;
  activeCtx.shadowOffsetY = 0;

  activeCtx.font = CARD.titleFont;
  activeCtx.fillStyle = "rgba(255,255,255,.95)";
  activeCtx.textAlign = "left";
  drawTextCentered(item.title, tx, ty);

  const bs = CARD.badgeSize;
  const bx = x + w - CARD.innerPadX - bs;
  const by = y + (h - bs)/2;

  const hasAvg = (typeof item.avg === "number" && !Number.isNaN(item.avg));

  if (!hasAvg && !item.hasUnknown){
    activeCtx.restore();
    return;
  }

  roundRectPath(bx, by, bs, bs, CARD.badgeRadius);

  if (!hasAvg && item.hasUnknown){
    activeCtx.fillStyle = unknown.color;
    activeCtx.fill();

    activeCtx.font = CARD.badgeFont;
    activeCtx.fillStyle = unknown.text;
    activeCtx.textAlign = "center";
    drawTextCentered("?", bx + bs/2, by + bs/2 + 1);

    activeCtx.restore();
    return;
  }

  const shown = Math.round(item.avg * 10) / 10;
  const bucket = pickBucket(shown, minScore, maxScore);

  activeCtx.fillStyle = bucket.color;
  activeCtx.fill();

  activeCtx.font = CARD.badgeFont;
  activeCtx.fillStyle = bucket.text;
  activeCtx.textAlign = "center";
  drawTextCentered(formatScore(shown), bx + bs/2, by + bs/2 + 1);

  activeCtx.restore();
}

/* logo dans carte "filler" + retourne rect complet */
function drawLogoCardInline(x, y, w, h){
  if (!logoImage) return null;

  const { w: lw, h: lh } = getLogoScaledSize();

  const padX = Math.min(LOGO.padX, Math.floor(w * 0.22));
  const padY = 8;

  let dx = Math.round(x + w - padX - lw);
  let dy = Math.round(y + (h - lh) / 2 + LOGO.yBias);

  dx = clamp(dx, x + padY, x + w - lw - padY);
  dy = clamp(dy, y + padY, y + h - lh - padY);

  activeCtx.save();
  activeCtx.shadowColor = "rgba(0,0,0,0)";
  activeCtx.shadowBlur = 0;
  activeCtx.shadowOffsetX = 0;
  activeCtx.shadowOffsetY = 0;

  activeCtx.globalAlpha = LOGO.opacity;
  activeCtx.drawImage(logoImage, dx, dy, lw, lh);
  activeCtx.restore();

  return { x: dx, y: dy, w: lw, h: lh, cardX: x, cardY: y, cardW: w, cardH: h, padX };
}

/* note sous logo dans la carte filler, X indépendant du logo */
function drawSeriesScoreUnderInlineLogo(logoRect, rows){
  const m = measureSeriesScoreBlock(rows);
  if (!m || !logoRect) return false;

  const available = (logoRect.cardY + logoRect.cardH) - (logoRect.y + logoRect.h) - SERIES_FOOT.padY;
  const need = SERIES_FOOT.gapUnderLogo + m.totalH;
  if (available < need) return false;

  const anchorRight = (logoRect.cardX + logoRect.cardW - logoRect.padX);
  let topY = logoRect.y + logoRect.h + SERIES_FOOT.gapUnderLogo;
  topY = clamp(topY, logoRect.cardY + SERIES_FOOT.padY, logoRect.cardY + logoRect.cardH - m.totalH - SERIES_FOOT.padY);

  const xLeft = clamp(anchorRight - m.totalW, logoRect.cardX + 12, logoRect.cardX + logoRect.cardW - 12 - m.totalW);

  const starY = topY + Math.round((m.totalH - SERIES_FOOT.starSize) / 2) - 3;
  const baselineY = topY + m.ascent;

  drawStarIcon(px(xLeft), px(starY), SERIES_FOOT.starSize, "orange");

  activeCtx.save();
  activeCtx.shadowColor = "rgba(0,0,0,0)";
  activeCtx.shadowBlur = 0;
  activeCtx.shadowOffsetX = 0;
  activeCtx.shadowOffsetY = 0;

  const textX = xLeft + SERIES_FOOT.starSize + SERIES_FOOT.gap;

  activeCtx.font = L.fontSeriesScore;
  activeCtx.fillStyle = "rgba(255,255,255,.95)";
  activeCtx.textAlign = "left";
  activeCtx.textBaseline = "alphabetic";
  activeCtx.fillText(m.mainText, px(textX), px(baselineY));

  activeCtx.font = L.fontSeriesScoreSuffix;
  activeCtx.fillStyle = "rgba(255,255,255,.85)";
  activeCtx.fillText(m.suffixText, px(textX + m.mMainW), px(baselineY));

  activeCtx.font = L.fontSeriesMeta;
  activeCtx.fillStyle = "rgba(255,255,255,.55)";
  activeCtx.fillText(m.metaText, px(textX + m.mMainW + m.mSuffixW), px(baselineY));

  activeCtx.restore();

  return true;
}

function renderSeasonalMode(seasons, rows, minScore, maxScore){
  activeCanvas.width = 900;
  const W = activeCanvas.width;

  const cols = (W >= CARD.colsMinW) ? 2 : 1;
  const pad = CARD.pad;
  const gap = CARD.gap;

  const cardW = (cols === 2)
    ? Math.floor((W - pad*2 - gap) / 2)
    : (W - pad*2);

  const cardH = CARD.cardH;

  let items = computeSeasonAverages(seasons, rows);

  const hasSeriesScore = (parseSeriesScoreInput() != null);
  const useInlineLogoFiller = (cols === 2) && (items.length % 2 === 1) && !!logoImage;
  if (useInlineLogoFiller){
    items = [...items, { type: "logo" }];
  }

  const useFooterLogo = !!logoImage && !useInlineLogoFiller;

  const rowsCount = Math.ceil(items.length / cols);
  const cardsBlockH = (rowsCount * cardH) + (Math.max(0, rowsCount - 1) * gap);

  let needFooter = useFooterLogo || hasSeriesScore;

  let footerH = 0;
  if (needFooter){
    const m = hasSeriesScore ? measureSeriesScoreBlock(rows) : null;
    const { h: logoH } = getLogoScaledSize();

    if (useFooterLogo && hasSeriesScore && m){
      footerH = Math.max(
        FOOTER.minH,
        SERIES_FOOT.stackTopPad + logoH + SERIES_FOOT.gapUnderLogo + m.totalH + SERIES_FOOT.padY
      );
    } else if (useFooterLogo){
      footerH = Math.max(FOOTER.minH, logoH + SERIES_FOOT.padY*2);
    } else if (hasSeriesScore && m){
      footerH = Math.max(FOOTER.minH, m.totalH + SERIES_FOOT.padY*2);
    } else {
      footerH = FOOTER.minH;
    }
  }

  const footerGap = needFooter ? 6 : 0;
  const Hneeded = pad + cardsBlockH + footerGap + footerH + pad;
  activeCanvas.height = Math.max(Math.ceil(Hneeded), 420);

  const H = activeCanvas.height;
  activeCtx.clearRect(0,0,W,H);
  drawBackground(W,H);

  let fillerHadNote = false;

  for (let i=0; i<items.length; i++){
    const r = Math.floor(i / cols);
    const c = i % cols;
    const x = pad + c * (cardW + gap);
    const y = pad + r * (cardH + gap);

    const item = items[i];

    if (item && item.type === "logo"){
      const lr = drawLogoCardInline(x, y, cardW, cardH);
      if (hasSeriesScore){
        fillerHadNote = drawSeriesScoreUnderInlineLogo(lr, rows);
        if (!fillerHadNote){
          needFooter = true;
        }
      }
      continue;
    }

    drawSeasonCard(x, y, cardW, cardH, item, minScore, maxScore);
  }

  if (needFooter){
    const footerTop = pad + cardsBlockH + footerGap;

    const hasScore = (parseSeriesScoreInput() != null);
    const stack = !!logoImage && hasScore && useFooterLogo;

    const logoRect = stack
      ? drawLogoInFooterStacked(W, footerTop)
      : (useFooterLogo ? drawLogoInFooterCentered(W, footerTop, footerH) : null);

    if (!(useInlineLogoFiller && fillerHadNote)){
      drawSeriesScoreFooter(W, footerTop, footerH, logoRect, rows);
    }
  }
}

function renderGridMode(seasons, rows, minScore, maxScore){
  const S = seasons.length;
  const E = rows.length;

  const gridWidthNeeded =
    L.leftLabelW +
    (S * L.cellW) +
    (Math.max(0, S - 1) * L.gapX) +
    L.pad * 2;

  activeCanvas.width = Math.max(900, gridWidthNeeded);

  const gridH = (E * L.cellH) + (Math.max(0, E - 1) * L.gapY);
  const t = clamp((E - FLEX.fewEp) / 10, 0, 1);
  const topExtra = Math.round(FLEX.topMin + (FLEX.topMax - FLEX.topMin) * t);

  const gridTop = L.pad + topExtra;
  const gridX0 = L.pad + L.leftLabelW;
  const gridY0 = gridTop + L.topLabelH;

  const avgY = gridY0 + gridH + AVG.gapFromGrid;

  const hasSeriesScore = (parseSeriesScoreInput() != null);
  const needFooter = !!logoImage || hasSeriesScore;

  const m = hasSeriesScore ? measureSeriesScoreBlock(rows) : null;
  const { h: logoH } = getLogoScaledSize();

  let footerH = FOOTER.minH;
  if (needFooter){
    if (logoImage && hasSeriesScore && m){
      footerH = Math.max(
        FOOTER.minH,
        SERIES_FOOT.stackTopPad + logoH + SERIES_FOOT.gapUnderLogo + m.totalH + SERIES_FOOT.padY
      );
    } else if (logoImage){
      footerH = Math.max(FOOTER.minH, logoH + SERIES_FOOT.padY*2);
    } else if (hasSeriesScore && m){
      footerH = Math.max(FOOTER.minH, m.totalH + SERIES_FOOT.padY*2);
    }
  }

  const footerTop = avgY + AVG.blockH + FOOTER.gapFromAvg;
  const Hneeded = footerTop + footerH + L.pad;
  activeCanvas.height = Math.max(Math.ceil(Hneeded), 420);

  const W = activeCanvas.width;
  const H = activeCanvas.height;

  activeCtx.clearRect(0,0,W,H);
  drawBackground(W,H);

  activeCtx.save();
  activeCtx.shadowColor = "rgba(0,0,0,0)";
  activeCtx.shadowBlur = 0;
  activeCtx.shadowOffsetX = 0;
  activeCtx.shadowOffsetY = 0;

  activeCtx.font = L.fontAxis;
  activeCtx.fillStyle = "#ffffff";
  activeCtx.textAlign = "center";

  for (let s = 0; s < S; s++){
    const x = gridX0 + s * (L.cellW + L.gapX) + L.cellW / 2;
    const y = gridTop + L.topLabelH / 2;
    drawTextCentered(seasons[s] || ("S" + (s+1)), x, y);
  }

  activeCtx.textAlign = "left";
  for (let e = 0; e < E; e++){
    const x = L.pad;
    const y = gridY0 + e * (L.cellH + L.gapY) + L.cellH / 2;
    drawTextCentered("E" + (e+1), x, y);
  }

  activeCtx.restore();

  for (let e = 0; e < E; e++){
    for (let s = 0; s < S; s++){
      const raw = (rows[e] && s < rows[e].length) ? rows[e][s] : null;
      if (raw == null) continue;

      const isUnknown = (raw === "X");
      const bucket = isUnknown ? unknown : pickBucket(raw, minScore, maxScore);

      const x = gridX0 + s * (L.cellW + L.gapX);
      const y = gridY0 + e * (L.cellH + L.gapY);

      activeCtx.fillStyle = bucket.color;
      roundRectPath(x, y, L.cellW, L.cellH, L.r);
      activeCtx.fill();

      activeCtx.font = L.fontCell;
      activeCtx.fillStyle = bucket.text;
      activeCtx.textAlign = "center";

      const txt = isUnknown ? "?" : formatScore(Number(raw));
      drawTextCentered(txt, x + L.cellW/2, y + L.cellH/2 + 2);
    }
  }

  activeCtx.font = L.fontAvgLabel;
  activeCtx.fillStyle = "#ffffff";
  activeCtx.textAlign = "left";
  drawTextCentered("AVG.", L.pad, avgY);

  for (let s = 0; s < S; s++){
    const col = rows
      .map(r => (r && s < r.length) ? r[s] : null)
      .filter(v => v !== "X");

    const a = avg(col);
    const x = gridX0 + s * (L.cellW + L.gapX);

    if (a != null) {
      const shown = Number(a.toFixed(1));
      activeCtx.font = L.fontAvg;
      activeCtx.fillStyle = "#ffffff";
      activeCtx.textAlign = "center";
      drawTextCentered(formatScore(shown), x + L.cellW/2, avgY - 6);

      const b = pickBucket(shown, minScore, maxScore);
      const barY = avgY + AVG.barOffset;
      activeCtx.fillStyle = b.color;
      roundRectPath(x, barY, L.cellW, AVG.barH, 999);
      activeCtx.fill();
    }
  }

  const stack = !!logoImage && hasSeriesScore;
  const logoRect = stack
    ? drawLogoInFooterStacked(W, footerTop)
    : (logoImage ? drawLogoInFooterCentered(W, footerTop, footerH) : null);

  drawSeriesScoreFooter(W, footerTop, footerH, logoRect, rows);
}

/* =========================
   UI helpers
========================= */
function syncCardBgUI(){
  const on = seasonalMode;
  cardBgLabel.classList.toggle("hidden", !on);
  cardBgPickBtn.classList.toggle("hidden", !on);
  cardBgClearOneBtn.classList.toggle("hidden", !on);
  cardBgClearAllBtn.classList.toggle("hidden", !on);
}

function syncSeasonDropdown(seasons){
  const current = cardBgSeason.value;
  cardBgSeason.innerHTML = "";
  for (let i=0; i<seasons.length; i++){
    const opt = document.createElement("option");
    opt.value = String(i);
    opt.textContent = seasons[i] || `S${i+1}`;
    cardBgSeason.appendChild(opt);
  }
  if (current && Number(current) < seasons.length) cardBgSeason.value = current;
}

function render(){
  buildLegend();

  if (activeCanvas !== canvas){
    activeCanvas = canvas;
    activeCtx = ctx;
  }

  const { seasons, rows } = parseCSV(csvEl.value);

  if (cardBgImages.length !== seasons.length){
    const next = new Array(seasons.length).fill(null);
    for (let i=0;i<Math.min(cardBgImages.length, next.length);i++) next[i] = cardBgImages[i];
    cardBgImages = next;
  }

  syncSeasonDropdown(seasons);

  if (seasonalMode){
    renderSeasonalMode(seasons, rows, MIN_SCORE, MAX_SCORE);
  } else {
    renderGridMode(seasons, rows, MIN_SCORE, MAX_SCORE);
  }
}

function exportPNG(){
  const scale = EXPORT_SCALE;

  const src = canvas;
  const exportCanvas = document.createElement("canvas");
  exportCanvas.width = Math.round(src.width * scale);
  exportCanvas.height = Math.round(src.height * scale);

  const ectx = exportCanvas.getContext("2d", { alpha: true });

  ectx.setTransform(scale, 0, 0, scale, 0, 0);
  ectx.imageSmoothingEnabled = true;
  ectx.imageSmoothingQuality = "high";
  ectx.drawImage(src, 0, 0);

  const filename = seasonalMode ? "series_cards.png" : "series_grid.png";

  exportCanvas.toBlob((blob) => {
    if (!blob) return;

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    setTimeout(() => URL.revokeObjectURL(url), 1500);
  }, "image/png");
}

function fileToImage(file){
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
    img.onerror = (e) => { URL.revokeObjectURL(url); reject(e); };
    img.src = url;
  });
}

/* =========================
   EVENTS
========================= */
csvEl.addEventListener("input", render);
seriesScoreEl.addEventListener("input", render);
seriesScoreEl.addEventListener("change", render);
seriesEpisodesOverrideEl.addEventListener("input", render);
seriesEpisodesOverrideEl.addEventListener("change", render);

modeBtn.addEventListener("click", () => {
  seasonalMode = !seasonalMode;
  modeBtn.setAttribute("aria-checked", seasonalMode ? "true" : "false");
  syncCardBgUI();
  render();
});

cardBgPickBtn.addEventListener("click", () => { cardBgFile.click(); });

cardBgFile.addEventListener("change", async (e) => {
  const f = e.target.files?.[0];
  if (!f) return;

  const idx = Number(cardBgSeason.value);
  if (!Number.isFinite(idx)) return;

  try{
    const img = await fileToImage(f);
    cardBgImages[idx] = img;
  }catch(err){
    console.error("Card BG load failed:", err);
  }
  cardBgFile.value = "";
  render();
});

cardBgClearOneBtn.addEventListener("click", () => {
  const idx = Number(cardBgSeason.value);
  if (Number.isFinite(idx) && idx >= 0 && idx < cardBgImages.length){
    cardBgImages[idx] = null;
    render();
  }
});

cardBgClearAllBtn.addEventListener("click", () => {
  cardBgImages = cardBgImages.map(()=>null);
  render();
});

exportBtn.addEventListener("click", exportPNG);

bgFile.addEventListener("change", async (e) => {
  const f = e.target.files?.[0];
  if (!f) return;
  bgImage = await fileToImage(f);
  render();
});
clearBgBtn.addEventListener("click", () => {
  bgImage = null;
  bgFile.value = "";
  render();
});

logoFile.addEventListener("change", async (e) => {
  const f = e.target.files?.[0];
  if (!f) return;
  try{
    logoImage = await fileToImage(f);
  }catch(err){
    console.error("Logo load failed:", err);
    logoImage = null;
  }
  render();
});
clearLogoBtn.addEventListener("click", () => {
  logoImage = null;
  logoFile.value = "";
  render();
});

/* init */
buildLegend();
syncCardBgUI();
render();
</script>
